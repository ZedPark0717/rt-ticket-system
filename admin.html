<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RT Admin</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    background: #111;
    color: #fff;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 16px;
  }

  .card {
    background: #1c1c1c;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
  }

  .pending { background: orange; color: #000; }
  .processing { background: dodgerblue; color: #fff; }
  .done { background: limegreen; color: #000; }

  .reload {
    background: #444;
    color: white;
    width: 100%;
    margin-bottom: 12px;
  }

  .ticket-title {
    font-weight: 700;
    margin-bottom: 6px;
  }

  .small {
    font-size: 12px;
    color: #aaa;
  }

</style>
</head>

<body>

<div class="wrap">

  <header>RT ADMIN PANEL</header>

  <button class="btn reload" onclick="loadTickets()">전체 새로고침</button>

  <div id="list"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec";

async function loadTickets() {

  const res = await fetch(SCRIPT_URL + "?type=list");
  const text = await res.text();

  let data = [];

  try {
    data = JSON.parse(text);
  } catch (e) {
    document.getElementById("list").innerHTML =
      "<div class='card'>데이터 오류</div>";
    return;
  }

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.reverse().forEach(t => {

    box.innerHTML += `
      <div class="card">

        <div class="ticket-title">
          ${t.bulk_label || "-"} (${t.ticketId})
        </div>

        <div class="small">
          카테고리: ${t.category || "-"} <br>
          작업자: ${t.creator_id || "-"} <br>
          상태: ${t.status || "접수"}
        </div>

        <div class="row" style="margin-top:10px;">

          <button class="btn pending"
            onclick="updateStatus('${t.ticketId}','접수')">
            접수
          </button>

          <button class="btn processing"
            onclick="updateStatus('${t.ticketId}','처리중')">
            처리중
          </button>

          <button class="btn done"
            onclick="updateStatus('${t.ticketId}','완료')">
            완료
          </button>

        </div>

      </div>
    `;
  });
}

/* 상태 변경 */
async function updateStatus(ticketId, status) {

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "updateStatus",
      ticketId,
      status
    })
  });

  loadTickets();
}

loadTickets();

</script>

</body>
</html>
