<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RT Admin Panel</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    background: #f4f6f8;
    color: #222;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 14px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .btn {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
  }

  .reload {
    background: #222;
    color: #fff;
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-weight: 800;
    font-size: 15px;
  }

  .sub {
    font-size: 12px;
    color: #666;
    margin-top: 6px;
    line-height: 1.4;
  }

  .status {
    font-size: 12px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 8px;
  }

  .접수 { background: #ffe8a3; }
  .처리중 { background: #bcdcff; }
  .완료 { background: #c7f9cc; }
  .고객사확인중 { background: #ffd6a5; }

  .actions {
    margin-top: 10px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .act {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  .a1 { background: #ffcc00; }
  .a2 { background: #4dabf7; color: #fff; }
  .a3 { background: #40c057; color: #fff; }
  .a4 { background: #ffa94d; }
  .del { background: #fa5252; color: #fff; }

</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <header>RT ADMIN PANEL</header>
    <button class="btn reload" onclick="loadTickets()">새로고침</button>
  </div>

  <div id="list" class="list"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec";

async function loadTickets() {

  const res = await fetch(SCRIPT_URL + "?type=list");
  const text = await res.text();

  let data = [];

  try {
    data = JSON.parse(text);
  } catch (e) {
    document.getElementById("list").innerHTML =
      "<div class='card'>데이터 오류</div>";
    return;
  }

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.reverse().forEach(t => {

    const status = t.status || "접수";
    const statusClass = status.replace(" ", "");

    box.innerHTML += `
      <div class="card">

        <div class="row">
          <div class="title">${t.bulk_label || "-"}</div>
          <div class="status ${statusClass}">
            ${status}
          </div>
        </div>

        <div class="sub">
          📌 ${t.category || "-"}<br>
          👤 ${t.creator_id || "-"}<br>
          🆔 ${t.ticketId || "-"}
        </div>

        <div class="actions">

          <button class="act a1"
            onclick="updateStatus('${t.ticketId}','접수')">
            접수
          </button>

          <button class="act a2"
            onclick="updateStatus('${t.ticketId}','처리중')">
            처리중
          </button>

          <button class="act a4"
            onclick="updateStatus('${t.ticketId}','고객사 확인 중')">
            고객사 확인
          </button>

          <button class="act a3"
            onclick="updateStatus('${t.ticketId}','완료')">
            완료
          </button>

          <button class="act del"
            onclick="deleteTicket('${t.ticketId}')">
            삭제
          </button>

        </div>

      </div>
    `;
  });
}

/* 상태 변경 */
async function updateStatus(ticketId, status) {

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "updateStatus",
      ticketId,
      status
    })
  });

  loadTickets();
}

/* 삭제 */
async function deleteTicket(ticketId) {

  if (!confirm("진짜 삭제할까?")) return;

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "deleteTicket",
      ticketId
    })
  });

  loadTickets();
}

loadTickets();

</script>

</body>
</html>
