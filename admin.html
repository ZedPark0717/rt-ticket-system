<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RT Ticket Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--ink:#07162d;--muted:#667085;--line:#d9e1ec;--brand:#35bed9;--blue:#245cdf;--blue2:#153e9f;--ok:#108a43;--warn:#b7791f;--violet:#6d28d9;--red:#c2410c;--shadow:0 18px 48px rgba(15,23,42,.09)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#eef3f9 100%);color:var(--ink)}
    header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
    .wrap{width:min(1280px,100%);margin:0 auto;padding:16px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px}.sub{font-size:13px;color:var(--muted)}
    .logo{display:flex;align-items:center;gap:10px;font-weight:950;font-size:24px;letter-spacing:1px}.mark{width:42px;height:42px;border-radius:9px;background:var(--brand);display:grid;place-items:center;color:#fff;font-size:28px}.mark::before{content:"✦";transform:scale(1.25)}
    h1,h2{margin:0;letter-spacing:0}h1{font-size:21px}h2{font-size:16px}
    button,input,select{min-height:40px;border-radius:8px;font:inherit}button{border:0;padding:9px 12px;background:#e8eef8;color:#243044;font-weight:950;cursor:pointer;white-space:nowrap}button.primary{background:var(--blue);color:#fff}button.primary:hover{background:var(--blue2)}button.danger{background:#fee2e2;color:var(--red)}
    input,select{width:100%;border:1px solid var(--line);background:#fff;padding:9px 10px;color:var(--ink)}
    .dashboard{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.metric,.panel{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
    .metric{padding:15px;display:grid;gap:6px;position:relative;overflow:hidden}.metric::after{content:"";position:absolute;right:-28px;top:-28px;width:84px;height:84px;border-radius:50%;background:rgba(53,190,217,.14)}.metric span{color:var(--muted);font-size:12px;font-weight:950}.metric strong{font-size:30px;line-height:1}
    .charts{display:grid;grid-template-columns:360px minmax(0,1fr);gap:10px;margin-bottom:10px}.panel{padding:14px;min-width:0}.chartbox{height:245px;margin-top:8px}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;margin-bottom:10px}.filters{display:grid;grid-template-columns:1.2fr repeat(4,minmax(130px,.7fr));gap:8px}.range{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.range button.active{background:#dbeafe;color:var(--blue)}
    label{display:grid;gap:5px;color:#344054;font-size:12px;font-weight:950}
    .list{display:grid;gap:8px}.ticket-row{display:grid;grid-template-columns:180px minmax(0,1.1fr) minmax(120px,.7fr) 150px 100px;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px;min-width:0}.ticket-row:hover{border-color:#b9c7da;box-shadow:0 8px 22px rgba(15,23,42,.06)}
    .ticket-id{border:0;background:transparent;color:var(--blue);font-weight:950;text-align:left;padding:0;min-height:auto;cursor:pointer}.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.muted{color:var(--muted);font-size:13px}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-height:25px;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:950;background:#eef2f7}.s1{background:#fff4d6;color:var(--warn)}.s2{background:#e8f1ff;color:var(--blue)}.s3{background:#f0e8ff;color:var(--violet)}.s4{background:#e8f8ef;color:var(--ok)}.remind{background:#ffe4e6;color:#be123c}.empty{padding:24px;text-align:center;color:var(--muted)}
    dialog{width:min(820px,calc(100% - 28px));border:0;border-radius:8px;padding:0;box-shadow:0 28px 80px rgba(15,23,42,.3)}dialog::backdrop{background:rgba(15,23,42,.45)}.modal{padding:20px}.detail{display:grid;grid-template-columns:140px minmax(0,1fr);gap:10px 12px;margin:14px 0}.detail b{color:#344054}.pre{white-space:pre-wrap;word-break:break-word}.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.status-line{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;margin-top:12px}
    @media(max-width:920px){.dashboard{grid-template-columns:repeat(2,1fr)}.charts,.toolbar,.filters{grid-template-columns:1fr}.range{justify-content:flex-start}.ticket-row{grid-template-columns:1fr;gap:6px}.topbar{align-items:flex-start;flex-direction:column}}@media(max-width:560px){.wrap{padding:12px}.metric strong{font-size:25px}.chartbox{height:220px}.logo{font-size:21px}.status-line{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="wrap topbar">
    <div>
      <h1>RT Ticket Admin</h1>
      <div class="sub">운영 현황 및 티켓 관리</div>
    </div>
    <div class="logo">
  <img src="assets/maersk-logo.png" alt="MAERSK">
</div>
  </div>
</header>

<main class="wrap">
  <section class="dashboard">
    <div class="metric"><span>접수</span><strong id="countOpen">0</strong></div>
    <div class="metric"><span>내용 확인 중</span><strong id="countCheck">0</strong></div>
    <div class="metric"><span>고객사 확인 중</span><strong id="countClient">0</strong></div>
    <div class="metric"><span>완료</span><strong id="countDone">0</strong></div>
  </section>

  <section class="charts">
    <div class="panel"><h2>Status Overview</h2><div class="chartbox"><canvas id="statusChart"></canvas></div></div>
    <div class="panel"><h2>Category Volume</h2><div class="chartbox"><canvas id="categoryChart"></canvas></div></div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <div class="filters">
        <label>검색 <input id="keyword" placeholder="Ticket ID, 날짜, SKU, 코멘트"></label>
        <label>Bulk Label <input id="bulkLabel" placeholder="벌크라벨"></label>
        <label>Ticket ID <input id="ticketId" placeholder="RT-20260627"></label>
        <label>Status
          <select id="status">
            <option value="">전체</option>
            <option>접수</option>
            <option>내용 확인 중</option>
            <option>고객사 확인 중</option>
            <option>완료</option>
          </select>
        </label>
        <label>리마인드
          <select id="reminded">
            <option value="">전체</option>
            <option value="true">리마인드 건</option>
          </select>
        </label>
      </div>
      <div>
        <div class="range">
          <button type="button" data-range="today">오늘</button>
          <button type="button" data-range="1">1일</button>
          <button type="button" data-range="7" class="active">7일</button>
          <button type="button" data-range="30">30일</button>
          <button type="button" data-range="all">전체</button>
          <button class="primary" id="refreshBtn" type="button">새로고침</button>
        </div>
      </div>
    </div>

    <div id="ticketList" class="list">
      <div class="empty">데이터를 불러오는 중입니다.</div>
    </div>
  </section>
</main>

<dialog id="detailDialog">
  <div class="modal">
    <h2>티켓 상세</h2>
    <div id="detailBody"></div>
    <div class="status-line">
      <select id="detailStatus">
        <option>접수</option>
        <option>내용 확인 중</option>
        <option>고객사 확인 중</option>
        <option>완료</option>
      </select>
      <button class="primary" id="saveStatus" type="button">상태 변경</button>
      <button id="openPhoto" type="button">사진 열기</button>
      <button class="danger" id="deleteTicket" type="button">삭제</button>
    </div>
    <div class="detail-actions">
      <button type="button" onclick="document.querySelector('#detailDialog').close()">닫기</button>
    </div>
  </div>
</dialog>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec';
const STATUSES = ['접수', '내용 확인 중', '고객사 확인 중', '완료'];
const state = { tickets: [], filtered: [], range: '7', selected: null, statusChart: null, categoryChart: null };
const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

document.addEventListener('DOMContentLoaded', () => {
  $('#refreshBtn').addEventListener('click', loadTickets);
  ['keyword', 'bulkLabel', 'ticketId'].forEach((id) => {
    $('#' + id).addEventListener('input', applyFilters);
  });
  $('#status').addEventListener('change', applyFilters);
  $('#reminded').addEventListener('change', applyFilters);

  $$('.range button[data-range]').forEach((button) => {
    button.addEventListener('click', () => {
      state.range = button.dataset.range;
      $$('.range button[data-range]').forEach((item) => item.classList.toggle('active', item === button));
      applyFilters();
    });
  });

  $('#saveStatus').addEventListener('click', saveStatus);
  $('#openPhoto').addEventListener('click', () => {
    if (state.selected && state.selected.image) window.open(state.selected.image, '_blank', 'noopener');
  });
  $('#deleteTicket').addEventListener('click', deleteSelectedTicket);

  loadTickets();
});

async function loadTickets() {
  $('#ticketList').innerHTML = '<div class="empty">데이터를 불러오는 중입니다.</div>';

  try {
    const data = await api('list', {});
    state.tickets = (data.tickets || []).map(normalizeTicket);
    applyFilters();
  } catch (err) {
    $('#ticketList').innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
  }
}

function applyFilters() {
  const filters = {
    keyword: clean($('#keyword').value).toLowerCase(),
    bulkLabel: clean($('#bulkLabel').value),
    ticketId: clean($('#ticketId').value).toLowerCase(),
    status: $('#status').value,
    reminded: $('#reminded').value,
  };
  const minDate = getMinDate(state.range);

  state.filtered = state.tickets.filter((ticket) => {
    if (minDate && parseTicketDate(ticket.date) < minDate) return false;
    if (filters.bulkLabel && ticket.bulkLabel !== filters.bulkLabel) return false;
    if (filters.ticketId && !ticket.ticketId.toLowerCase().includes(filters.ticketId)) return false;
    if (filters.status && ticket.status !== filters.status) return false;
    if (filters.reminded === 'true' && !ticket.reminded) return false;

    if (filters.keyword) {
      const haystack = [ticket.ticketId, ticket.date, ticket.category, ticket.bulkLabel, ticket.sku, ticket.creatorId, ticket.comment, ticket.status].join(' ').toLowerCase();
      if (!haystack.includes(filters.keyword)) return false;
    }

    return true;
  });

  renderDashboard();
  renderCharts();
  renderList();
}

function renderDashboard() {
  const counts = countByStatus(state.filtered);
  $('#countOpen').textContent = counts['접수'] || 0;
  $('#countCheck').textContent = counts['내용 확인 중'] || 0;
  $('#countClient').textContent = counts['고객사 확인 중'] || 0;
  $('#countDone').textContent = counts['완료'] || 0;
}

function renderCharts() {
  const statusCounts = countByStatus(state.filtered);
  const categoryCounts = state.filtered.reduce((acc, ticket) => {
    const key = normalizeCategory(ticket.category);
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});

  state.statusChart = drawChart(
    state.statusChart,
    $('#statusChart'),
    'doughnut',
    STATUSES,
    STATUSES.map((key) => statusCounts[key] || 0),
    ['#f6c85f', '#245cdf', '#7c3aed', '#16a34a']
  );

  state.categoryChart = drawChart(
    state.categoryChart,
    $('#categoryChart'),
    'bar',
    Object.keys(categoryCounts),
    Object.values(categoryCounts),
    ['#245cdf', '#35bed9', '#7c3aed', '#16a34a', '#f59e0b', '#ef4444']
  );
}

function renderList() {
  if (!state.filtered.length) {
    $('#ticketList').innerHTML = '<div class="empty">조회된 티켓이 없습니다.</div>';
    return;
  }

  $('#ticketList').innerHTML = state.filtered.map((ticket) => `
    <article class="ticket-row">
      <button class="ticket-id" data-ticket="${escapeAttr(ticket.ticketId)}">${escapeHtml(ticket.ticketId)}</button>
      <div class="ellipsis"><b>${escapeHtml(ticket.category)}</b><div class="muted">${escapeHtml(ticket.date)}</div></div>
      <div class="ellipsis">${escapeHtml(ticket.bulkLabel)}</div>
      <span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span>
      <span>${ticket.reminded ? '<span class="badge remind">리마인드</span>' : ''}</span>
    </article>
  `).join('');

  $$('button[data-ticket]').forEach((button) => {
    button.addEventListener('click', () => showDetail(button.dataset.ticket));
  });
}

function showDetail(ticketId) {
  const ticket = state.tickets.find((item) => item.ticketId === ticketId);
  if (!ticket) return;
  state.selected = ticket;

  $('#detailStatus').value = ticket.status;
  $('#openPhoto').disabled = !ticket.image;

  $('#detailBody').innerHTML = `
    <div class="detail">
      <b>Ticket ID</b><span>${escapeHtml(ticket.ticketId)}</span>
      <b>Date</b><span>${escapeHtml(ticket.date)}</span>
      <b>Category</b><span>${escapeHtml(ticket.category)}</span>
      <b>Bulk Label</b><span>${escapeHtml(ticket.bulkLabel)}</span>
      <b>SKU</b><span class="pre">${escapeHtml(ticket.sku)}</span>
      <b>작업자 ID</b><span>${escapeHtml(ticket.creatorId)}</span>
      <b>Status</b><span><span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span></span>
      <b>리마인드</b><span>${ticket.reminded ? '<span class="badge remind">리마인드 건</span>' : '-'}</span>
      <b>사진</b><span>${ticket.image ? `<a href="${escapeAttr(ticket.image)}" target="_blank" rel="noopener">Drive 폴더 열기</a>` : '-'}</span>
      <b>Comment</b><span>${escapeHtml(ticket.comment || '-')}</span>
      <b>History</b><span class="pre">${escapeHtml(ticket.history || '-')}</span>
    </div>
  `;

  $('#detailDialog').showModal();
}

async function saveStatus() {
  if (!state.selected) return;

  try {
    await api('updateStatus', { ticketId: state.selected.ticketId, status: $('#detailStatus').value, actor: 'admin' });
    $('#detailDialog').close();
    await loadTickets();
  } catch (err) {
    alert(err.message);
  }
}

async function deleteSelectedTicket() {
  if (!state.selected) return;
  if (!confirm(`${state.selected.ticketId} 티켓을 삭제할까요?`)) return;

  try {
    await api('deleteTicket', { ticketId: state.selected.ticketId, actor: 'admin' });
    $('#detailDialog').close();
    await loadTickets();
  } catch (err) {
    alert(err.message);
  }
}

async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload }),
  });

  const json = await res.json();
  if (!json.ok) throw new Error(json.error?.message || '요청 처리 중 오류가 발생했습니다.');
  return json.data;
}

function drawChart(existing, canvas, type, labels, data, colors) {
  if (existing) existing.destroy();

  return new Chart(canvas, {
    type,
    data: {
      labels,
      datasets: [{
        data: data,
        backgroundColor: colors,
        borderRadius: type === 'bar' ? 8 : 0,
        borderWidth: type === 'doughnut' ? 4 : 0,
        borderColor: '#fff',
        hoverOffset: type === 'doughnut' ? 8 : 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: type === 'doughnut' ? '64%' : undefined,
      plugins: {
        legend: {
          position: type === 'doughnut' ? 'bottom' : 'top',
          labels: { usePointStyle: true, boxWidth: 8, font: { weight: '700' } },
        },
      },
      scales: type === 'bar'
        ? {
            x: { grid: { display: false } },
            y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#edf1f7' } },
          }
        : {},
    },
  });
}

function normalizeTicket(ticket) {
  return {
    ticketId: clean(ticket.ticketId),
    date: clean(ticket.date),
    category: normalizeCategory(ticket.category),
    bulkLabel: clean(ticket.bulkLabel),
    sku: String(ticket.sku ?? ''),
    creatorId: clean(ticket.creatorId),
    image: clean(ticket.image),
    comment: String(ticket.comment ?? ''),
    status: normalizeStatus(ticket.status),
    history: String(ticket.history ?? ''),
    reminded: Boolean(ticket.reminded) || String(ticket.history ?? '').includes('[리마인드]'),
  };
}

function normalizeCategory(value) {
  const text = clean(value);
  return !text || text === 'undefined' || text === 'null' ? '미분류' : text;
}

function normalizeStatus(value) {
  const text = clean(value);
  if (text === '진행중') return '내용 확인 중';
  if (STATUSES.includes(text)) return text;
  return '접수';
}

function countByStatus(tickets) {
  return tickets.reduce((acc, ticket) => {
    acc[ticket.status] = (acc[ticket.status] || 0) + 1;
    return acc;
  }, {});
}

function getMinDate(range) {
  if (range === 'all') return null;

  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if (range === 'today') return start;

  start.setDate(start.getDate() - Number(range));
  return start;
}

function parseTicketDate(value) {
  if (!value) return new Date(0);
  return new Date(String(value).replace(' ', 'T'));
}

function statusClass(status) {
  if (status === '내용 확인 중') return 's2';
  if (status === '고객사 확인 중') return 's3';
  if (status === '완료') return 's4';
  return 's1';
}

function clean(value) { return String(value ?? '').trim(); }
function escapeHtml(value) { return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }
</script>
</body>
</html>
