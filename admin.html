<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RT Admin</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    background: #f4f6f8;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .filters button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    background: #ddd;
  }

  .card {
    background: #fff;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }

  .row {
    display: flex;
    justify-content: space-between;
  }

  .title {
    font-weight: 800;
  }

  .sub {
    font-size: 12px;
    color: #666;
    margin-top: 6px;
  }

  .btn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .del { background: #ff4d4f; color: white; }

</style>
</head>

<body>

<div class="wrap">

  <header>RT ADMIN</header>

  <div class="filters">
    <button onclick="loadTickets(0)">오늘</button>
    <button onclick="loadTickets(1)">1일</button>
    <button onclick="loadTickets(7)">7일</button>
  </div>

  <div id="list"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec";

async function loadTickets(days = 1) {

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "list",
      days: days
    })
  });

  const data = await res.json();

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.reverse().forEach(t => {

    box.innerHTML += `
      <div class="card">

        <div class="row">
          <div class="title">${t.bulk_label || "-"}</div>
          <div>${t.status || "접수"}</div>
        </div>

        <div class="sub">
          ${t.category || "-"} | ${t.creator_id || "-"}<br>
          ${t.ticketId}
        </div>

        <button class="btn del"
          onclick="deleteTicket('${t.ticketId}')">
          삭제
        </button>

      </div>
    `;
  });
}

async function deleteTicket(id) {

  if (!confirm("삭제할까?")) return;

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "deleteTicket",
      ticketId: id
    })
  });

  loadTickets();
}

loadTickets(1);

</script>

</body>
</html>
