<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RT Ticket Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f4f6fa;--panel:#fff;--text:#152033;--muted:#64748b;--line:#dbe1ea;--brand:#2563eb;--green:#14804a;--amber:#b7791f;--red:#c2410c;--violet:#6d28d9;--shadow:0 8px 22px rgba(15,23,42,.07)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .wrap{width:min(1280px,100%);margin:0 auto;padding:16px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px}
    h1,h2{margin:0;letter-spacing:0}h1{font-size:21px}h2{font-size:16px}
    button,input,select{min-height:40px;border-radius:8px;font:inherit}button{border:0;padding:9px 12px;background:#e8eef8;color:#243044;font-weight:900;cursor:pointer;white-space:nowrap}button.primary{background:var(--brand);color:#fff}button.danger{background:#fee2e2;color:var(--red)}
    input,select{width:100%;border:1px solid var(--line);background:#fff;padding:9px 10px;color:var(--text)}
    .dashboard{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.metric,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
    .metric{padding:14px;display:grid;gap:6px}.metric span{color:var(--muted);font-size:12px;font-weight:950}.metric strong{font-size:28px;line-height:1}
    .charts{display:grid;grid-template-columns:320px minmax(0,1fr);gap:10px;margin-bottom:10px}.panel{padding:14px;min-width:0}.chartbox{height:230px;margin-top:8px}
    .range{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px}.range button.active{background:#dbeafe;color:var(--brand)}
    .filters{display:grid;grid-template-columns:1.2fr repeat(5,minmax(110px,.8fr)) auto;gap:8px;align-items:end;margin-bottom:10px}
    label{display:grid;gap:5px;color:#334155;font-size:12px;font-weight:950}
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{width:100%;min-width:1120px;border-collapse:collapse;table-layout:fixed}
    th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}th{background:#f8fafc;color:#334155;font-size:12px;font-weight:950;position:static}
    th:nth-child(1),td:nth-child(1){width:150px}th:nth-child(2),td:nth-child(2){width:150px}th:nth-child(3),td:nth-child(3){width:115px}th:nth-child(4),td:nth-child(4){width:170px}th:nth-child(5),td:nth-child(5){width:170px}th:nth-child(6),td:nth-child(6){width:90px}th:nth-child(7),td:nth-child(7){width:120px}th:nth-child(8),td:nth-child(8){width:70px}th:nth-child(9),td:nth-child(9){width:260px}
    tr:hover td{background:#fbfdff}.badge{display:inline-flex;align-items:center;min-height:24px;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:950;background:#eef2f7}.s1{background:#fff4d6;color:var(--amber)}.s2{background:#e8f1ff;color:var(--brand)}.s3{background:#f0e8ff;color:var(--violet)}.s4{background:#e8f8ef;color:var(--green)}.remind{background:#ffe4e6;color:#be123c}
    .row-actions{display:grid;grid-template-columns:130px 48px 48px 48px;gap:6px;align-items:center;width:250px}.row-actions button{width:48px;min-width:48px;padding:8px 5px;line-height:1.1}.row-actions select{min-width:130px}
    .empty{padding:24px;text-align:center;color:var(--muted)}dialog{width:min(760px,calc(100% - 28px));border:0;border-radius:8px;padding:0;box-shadow:0 24px 80px rgba(15,23,42,.3)}dialog::backdrop{background:rgba(15,23,42,.45)}.modal{padding:18px}.detail-grid{display:grid;grid-template-columns:130px minmax(0,1fr);gap:8px 12px;margin:14px 0}.detail-grid b{color:#334155}pre{white-space:pre-wrap;word-break:break-word;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:0;max-height:260px;overflow:auto}
    @media(max-width:960px){.dashboard{grid-template-columns:repeat(2,1fr)}.charts,.filters{grid-template-columns:1fr}}@media(max-width:560px){.wrap{padding:12px}.topbar{align-items:flex-start;flex-direction:column}.metric strong{font-size:24px}.chartbox{height:220px}}
  </style>
</head>
<body>
<header>
  <div class="wrap topbar">
    <h1>RT Ticket Admin</h1>
    <button class="primary" id="refreshBtn" type="button">새로고침</button>
  </div>
</header>

<main class="wrap">
  <section class="dashboard">
    <div class="metric"><span>접수</span><strong id="countOpen">0</strong></div>
    <div class="metric"><span>내용 확인 중</span><strong id="countCheck">0</strong></div>
    <div class="metric"><span>고객사 확인 중</span><strong id="countClient">0</strong></div>
    <div class="metric"><span>완료</span><strong id="countDone">0</strong></div>
  </section>

  <section class="charts">
    <div class="panel"><h2>Status</h2><div class="chartbox"><canvas id="statusChart"></canvas></div></div>
    <div class="panel"><h2>Category</h2><div class="chartbox"><canvas id="categoryChart"></canvas></div></div>
  </section>

  <section class="panel">
    <div class="range">
      <button type="button" data-range="today">오늘</button>
      <button type="button" data-range="1">1일</button>
      <button type="button" data-range="7" class="active">7일</button>
      <button type="button" data-range="30">30일</button>
      <button type="button" data-range="all">전체</button>
    </div>

    <div class="filters">
      <label>검색 <input id="keyword" placeholder="Ticket ID, SKU, 코멘트"></label>
      <label>Bulk Label <input id="bulkLabel" placeholder="벌크라벨"></label>
      <label>Ticket ID <input id="ticketId" placeholder="RT-yyyymmdd-01"></label>
      <label>작업자 ID <input id="creatorId" placeholder="작업자"></label>
      <label>Status
        <select id="status">
          <option value="">전체</option>
          <option>접수</option>
          <option>내용 확인 중</option>
          <option>고객사 확인 중</option>
          <option>완료</option>
        </select>
      </label>
      <label>리마인드
        <select id="reminded">
          <option value="">전체</option>
          <option value="true">리마인드 건</option>
        </select>
      </label>
      <button id="applyFilters" class="primary" type="button">적용</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket ID</th>
            <th>Date</th>
            <th>Category</th>
            <th>Bulk Label</th>
            <th>SKU</th>
            <th>작업자</th>
            <th>Status</th>
            <th>알림</th>
            <th>작업</th>
          </tr>
        </thead>
        <tbody id="ticketRows">
          <tr><td colspan="9" class="empty">데이터를 불러오는 중입니다.</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<dialog id="detailDialog">
  <div class="modal">
    <h2>티켓 상세</h2>
    <div id="detailBody"></div>
    <button type="button" onclick="document.querySelector('#detailDialog').close()">닫기</button>
  </div>
</dialog>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec';
const STATUSES = ['접수', '내용 확인 중', '고객사 확인 중', '완료'];
const state = { tickets: [], filtered: [], range: '7', statusChart: null, categoryChart: null };
const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));

document.addEventListener('DOMContentLoaded', () => {
  $('#refreshBtn').addEventListener('click', loadTickets);
  $('#applyFilters').addEventListener('click', applyFilters);

  ['keyword', 'bulkLabel', 'ticketId', 'creatorId'].forEach((id) => {
    $('#' + id).addEventListener('keydown', (event) => {
      if (event.key === 'Enter') applyFilters();
    });
  });

  $('#status').addEventListener('change', applyFilters);
  $('#reminded').addEventListener('change', applyFilters);

  $$('.range button').forEach((button) => {
    button.addEventListener('click', () => {
      state.range = button.dataset.range;
      $$('.range button').forEach((item) => item.classList.toggle('active', item === button));
      applyFilters();
    });
  });

  loadTickets();
});

async function loadTickets() {
  $('#ticketRows').innerHTML = '<tr><td colspan="9" class="empty">데이터를 불러오는 중입니다.</td></tr>';

  try {
    const data = await api('list', {});
    state.tickets = (data.tickets || []).map(normalizeTicket);
    applyFilters();
  } catch (err) {
    $('#ticketRows').innerHTML = `<tr><td colspan="9" class="empty">${escapeHtml(err.message)}</td></tr>`;
  }
}

function applyFilters() {
  const filters = {
    keyword: $('#keyword').value.trim().toLowerCase(),
    bulkLabel: $('#bulkLabel').value.trim(),
    ticketId: $('#ticketId').value.trim(),
    creatorId: $('#creatorId').value.trim(),
    status: $('#status').value,
    reminded: $('#reminded').value,
  };

  const minDate = getMinDate(state.range);

  state.filtered = state.tickets.filter((ticket) => {
    if (minDate && parseTicketDate(ticket.date) < minDate) return false;
    if (filters.bulkLabel && ticket.bulkLabel !== filters.bulkLabel) return false;
    if (filters.ticketId && ticket.ticketId !== filters.ticketId) return false;
    if (filters.creatorId && ticket.creatorId !== filters.creatorId) return false;
    if (filters.status && ticket.status !== filters.status) return false;
    if (filters.reminded === 'true' && !ticket.reminded) return false;

    if (filters.keyword) {
      const haystack = [ticket.ticketId, ticket.category, ticket.bulkLabel, ticket.sku, ticket.creatorId, ticket.comment, ticket.status].join(' ').toLowerCase();
      if (!haystack.includes(filters.keyword)) return false;
    }

    return true;
  });

  renderDashboard();
  renderCharts();
  renderRows();
}

function renderDashboard() {
  const counts = countByStatus(state.filtered);
  $('#countOpen').textContent = counts['접수'] || 0;
  $('#countCheck').textContent = counts['내용 확인 중'] || 0;
  $('#countClient').textContent = counts['고객사 확인 중'] || 0;
  $('#countDone').textContent = counts['완료'] || 0;
}

function renderCharts() {
  const statusCounts = countByStatus(state.filtered);
  const categoryCounts = state.filtered.reduce((acc, ticket) => {
    const key = normalizeCategory(ticket.category);
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});

  state.statusChart = drawChart(
    state.statusChart,
    $('#statusChart'),
    'doughnut',
    STATUSES,
    STATUSES.map((key) => statusCounts[key] || 0),
    ['#f59e0b', '#2563eb', '#7c3aed', '#16a34a']
  );

  state.categoryChart = drawChart(
    state.categoryChart,
    $('#categoryChart'),
    'bar',
    Object.keys(categoryCounts),
    Object.values(categoryCounts),
    '#2563eb'
  );
}

function renderRows() {
  if (!state.filtered.length) {
    $('#ticketRows').innerHTML = '<tr><td colspan="9" class="empty">조회된 티켓이 없습니다.</td></tr>';
    return;
  }

  $('#ticketRows').innerHTML = state.filtered.map((ticket) => `
    <tr>
      <td><b>${escapeHtml(ticket.ticketId)}</b></td>
      <td>${escapeHtml(ticket.date)}</td>
      <td>${escapeHtml(ticket.category)}</td>
      <td>${escapeHtml(ticket.bulkLabel)}</td>
      <td title="${escapeAttr(ticket.sku)}">${escapeHtml(firstLine(ticket.sku))}</td>
      <td>${escapeHtml(ticket.creatorId)}</td>
      <td><span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span></td>
      <td>${ticket.reminded ? '<span class="badge remind">리마인드</span>' : ''}</td>
      <td>
        <div class="row-actions">
          <select data-ticket-id="${escapeAttr(ticket.ticketId)}">
            ${STATUSES.map((status) => `<option ${status === ticket.status ? 'selected' : ''}>${status}</option>`).join('')}
          </select>
          <button type="button" data-detail="${escapeAttr(ticket.ticketId)}">상세</button>
          ${ticket.image ? `<button type="button" data-image="${escapeAttr(ticket.image)}">사진</button>` : '<button type="button" disabled>사진</button>'}
          <button class="danger" type="button" data-delete="${escapeAttr(ticket.ticketId)}">삭제</button>
        </div>
      </td>
    </tr>
  `).join('');

  $$('select[data-ticket-id]').forEach((select) => {
    select.addEventListener('change', () => changeStatus(select.dataset.ticketId, select.value));
  });

  $$('button[data-detail]').forEach((button) => {
    button.addEventListener('click', () => showDetail(button.dataset.detail));
  });

  $$('button[data-image]').forEach((button) => {
    button.addEventListener('click', () => window.open(button.dataset.image, '_blank', 'noopener'));
  });

  $$('button[data-delete]').forEach((button) => {
    button.addEventListener('click', () => deleteTicket(button.dataset.delete));
  });
}

async function changeStatus(ticketId, status) {
  try {
    await api('updateStatus', { ticketId, status, actor: 'admin' });
    await loadTickets();
  } catch (err) {
    alert(err.message);
    await loadTickets();
  }
}

async function deleteTicket(ticketId) {
  if (!confirm(`${ticketId} 티켓을 삭제할까요?`)) return;

  try {
    await api('deleteTicket', { ticketId, actor: 'admin' });
    await loadTickets();
  } catch (err) {
    alert(err.message);
  }
}

function showDetail(ticketId) {
  const ticket = state.tickets.find((item) => item.ticketId === ticketId);
  if (!ticket) return;

  $('#detailBody').innerHTML = `
    <div class="detail-grid">
      <b>Ticket ID</b><span>${escapeHtml(ticket.ticketId)}</span>
      <b>Date</b><span>${escapeHtml(ticket.date)}</span>
      <b>Category</b><span>${escapeHtml(ticket.category)}</span>
      <b>Bulk Label</b><span>${escapeHtml(ticket.bulkLabel)}</span>
      <b>SKU</b><span style="white-space:pre-wrap">${escapeHtml(ticket.sku)}</span>
      <b>작업자 ID</b><span>${escapeHtml(ticket.creatorId)}</span>
      <b>Status</b><span><span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span></span>
      <b>리마인드</b><span>${ticket.reminded ? '<span class="badge remind">리마인드 건</span>' : '-'}</span>
      <b>사진</b><span>${ticket.image ? `<a href="${escapeAttr(ticket.image)}" target="_blank" rel="noopener">Drive 폴더 열기</a>` : '-'}</span>
      <b>Comment</b><span>${escapeHtml(ticket.comment || '')}</span>
    </div>
    <h2>History</h2>
    <pre>${escapeHtml(ticket.history || '')}</pre>
  `;

  $('#detailDialog').showModal();
}

async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload }),
  });

  const json = await res.json();
  if (!json.ok) throw new Error(json.error?.message || '요청 처리 중 오류가 발생했습니다.');
  return json.data;
}

function drawChart(existing, canvas, type, labels, data, colors) {
  if (existing) existing.destroy();

  return new Chart(canvas, {
    type,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: type === 'doughnut' ? 2 : 0,
        borderColor: '#fff',
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: type === 'doughnut' ? 'bottom' : 'top' },
      },
      scales: type === 'bar' ? { y: { beginAtZero: true, ticks: { precision: 0 } } } : {},
    },
  });
}

function normalizeTicket(ticket) {
  return {
    ticketId: clean(ticket.ticketId),
    date: clean(ticket.date),
    category: normalizeCategory(ticket.category),
    bulkLabel: clean(ticket.bulkLabel),
    sku: String(ticket.sku ?? ''),
    creatorId: clean(ticket.creatorId),
    image: clean(ticket.image),
    comment: String(ticket.comment ?? ''),
    status: normalizeStatus(ticket.status),
    history: String(ticket.history ?? ''),
    reminded: Boolean(ticket.reminded) || String(ticket.history ?? '').includes('[리마인드]'),
  };
}

function normalizeCategory(value) {
  const text = clean(value);
  if (!text || text === 'undefined' || text === 'null') return '미분류';
  return text;
}

function normalizeStatus(value) {
  const text = clean(value);
  if (text === '진행중') return '내용 확인 중';
  if (STATUSES.includes(text)) return text;
  return '접수';
}

function countByStatus(tickets) {
  return tickets.reduce((acc, ticket) => {
    acc[ticket.status] = (acc[ticket.status] || 0) + 1;
    return acc;
  }, {});
}

function getMinDate(range) {
  if (range === 'all') return null;

  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if (range === 'today') return start;

  start.setDate(start.getDate() - Number(range));
  return start;
}

function parseTicketDate(value) {
  if (!value) return new Date(0);
  return new Date(String(value).replace(' ', 'T'));
}

function statusClass(status) {
  if (status === '접수') return 's1';
  if (status === '내용 확인 중') return 's2';
  if (status === '고객사 확인 중') return 's3';
  if (status === '완료') return 's4';
  return 's1';
}

function firstLine(value) {
  return String(value || '').split(/\r?\n/).filter(Boolean)[0] || '';
}

function clean(value) {
  return String(value ?? '').trim();
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}
</script>
</body>
</html>
