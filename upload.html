<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RT Ticket Photo Upload</title>
  <style>
    :root {
      --navy: #061f3d;
      --sky: #42b9dd;
      --bg: #eef5fb;
      --line: #d8e4f0;
      --text: #071d3a;
      --muted: #5b6b80;
      --danger: #dc2626;
      --ok: #047857;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #eef7fb 0%, #f6f9fc 60%, #eaf2f8 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .top {
      background: var(--navy);
      color: #fff;
      border-bottom: 4px solid var(--sky);
      padding: 18px 20px;
    }

    .top-inner {
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand { display: grid; gap: 2px; }

    .brand strong {
      font-size: 19px;
      font-weight: 900;
      letter-spacing: .2px;
    }

    .brand span {
      color: #b9d2e5;
      font-size: 12px;
      font-weight: 800;
    }

    .logo {
      height: 34px;
      max-width: 150px;
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
      padding: 5px 7px;
    }

    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px 16px 34px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 18px 46px rgba(6, 31, 61, .12);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .card-head h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
      color: var(--navy);
    }

    .card-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
    }

    .card-body {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .ticket-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      max-width: 100%;
      padding: 9px 13px;
      border: 1px solid #b9dff0;
      border-radius: 999px;
      background: #eef8fc;
      color: var(--navy);
      font-weight: 900;
      word-break: break-all;
    }

    .file-box {
      border: 1px dashed #a9c7dd;
      border-radius: 14px;
      background: #f7fbfe;
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    input[type="file"] {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      font-size: 15px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button, a.button {
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .primary { background: #2f61df; color: #fff; }
    .ghost { background: #e8f0f8; color: var(--navy); }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .message {
      min-height: 22px;
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
      line-height: 1.45;
      word-break: keep-all;
    }

    .message.ok { color: var(--ok); }
    .message.error { color: var(--danger); }

    .progress {
      display: none;
      height: 10px;
      background: #dbe8f3;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--sky);
      transition: width .2s ease;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 700;
    }

    .version {
      font-size: 11px;
      color: #7a8aa0;
      font-weight: 800;
    }

    iframe {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      left: -9999px;
    }

    @media (max-width: 520px) {
      .top-inner { align-items: flex-start; }
      .logo { height: 30px; max-width: 120px; }
      .wrap { padding: 18px 12px 28px; }
      .card-body { padding: 16px; }
      .card-head { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <strong>RT Ticket Photo Upload</strong>
        <span>티켓별 사진 업로드</span>
      </div>
      <img class="logo" src="maersk-logo.png" alt="MAERSK" onerror="this.style.display='none';" />
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="card-head">
        <h1>사진 업로드</h1>
        <p>선택한 사진은 해당 티켓 전용 Drive 폴더에 저장됩니다.</p>
      </div>

      <div class="card-body">
        <div id="ticketId" class="ticket-pill">티켓번호 확인 중</div>

        <div class="file-box">
          <input id="files" type="file" accept="image/*" multiple />
          <p class="hint">사진을 여러 장 선택할 수 있습니다. 업로드 중에는 화면을 닫지 마세요.</p>
        </div>

        <div class="progress" id="progress"><span id="progressBar"></span></div>
        <div id="message" class="message"></div>

        <div class="actions">
          <button id="uploadBtn" class="primary" type="button">사진 업로드</button>
          <a id="homeLink" class="button ghost" href="./index.html">티켓 페이지로 돌아가기</a>
        </div>

        <div class="version">UPLOAD-GALLERY-IFRAME-POST-20260714</div>
      </div>
    </section>
  </main>

  <iframe id="uploadFrame" name="uploadFrame"></iframe>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec";
    const params = new URLSearchParams(location.search);
    const ticketId = (params.get("ticketId") || "").trim();
    const uploadToken = (params.get("token") || "").trim();

    const $ = id => document.getElementById(id);

    function setMessage(text, type = "") {
      $("message").textContent = text || "";
      $("message").className = "message" + (type ? " " + type : "");
    }

    function setProgress(done, total) {
      const percent = total ? Math.round((done / total) * 100) : 0;
      $("progress").style.display = total ? "block" : "none";
      $("progressBar").style.width = percent + "%";
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function postViaIframe(payload) {
      return new Promise((resolve, reject) => {
        const form = document.createElement("form");
        const iframe = $("uploadFrame");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("업로드 응답 시간이 초과되었습니다."));
        }, 60000);

        function cleanup() {
          window.clearTimeout(timeout);
          iframe.removeEventListener("load", onLoad);
          form.remove();
        }

        function onLoad() {
          cleanup();
          resolve({ ok: true });
        }

        form.method = "POST";
        form.action = API_URL;
        form.target = "uploadFrame";
        form.enctype = "application/x-www-form-urlencoded";
        form.style.display = "none";

        Object.keys(payload).forEach(key => {
          const input = document.createElement("textarea");
          input.name = key;
          input.value = payload[key] == null ? "" : String(payload[key]);
          form.appendChild(input);
        });

        iframe.addEventListener("load", onLoad);
        document.body.appendChild(form);
        form.submit();
      });
    }

    async function uploadOne(file) {
      const data = await readFile(file);
      return postViaIframe({
        action: "uploadTicketPhoto",
        ticketId,
        token: uploadToken,
        fileName: file.name,
        mimeType: file.type || "image/jpeg",
        data
      });
    }

    async function uploadFiles() {
      if (!ticketId) {
        setMessage("티켓번호가 없습니다. QR 링크를 다시 확인해주세요.", "error");
        return;
      }

      if (!uploadToken) {
        setMessage("업로드 권한 정보가 없습니다. QR코드를 다시 확인해주세요.", "error");
        return;
      }

      const files = Array.from($("files").files || []);
      if (!files.length) {
        setMessage("업로드할 사진을 선택해주세요.", "error");
        return;
      }

      $("uploadBtn").disabled = true;
      setProgress(0, files.length);
      setMessage("업로드 중입니다...");

      try {
        for (let i = 0; i < files.length; i++) {
          setMessage(`업로드 중입니다... ${i + 1} / ${files.length}`);
          await uploadOne(files[i]);
          setProgress(i + 1, files.length);
        }

        $("files").value = "";
        setMessage("업로드 요청이 완료되었습니다. Drive 폴더에서 사진을 확인해주세요.", "ok");
      } catch (err) {
        setMessage(err.message || "업로드 실패", "error");
      } finally {
        $("uploadBtn").disabled = false;
      }
    }

    $("ticketId").textContent = ticketId || "티켓번호 없음";
    $("uploadBtn").addEventListener("click", uploadFiles);
  </script>
</body>
</html>
