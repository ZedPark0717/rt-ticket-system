<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RT Ticket</title>

  <style>
    :root {
      --navy: #071d3a;
      --navy-2: #0b2f5b;
      --blue: #2f63e7;
      --sky: #42b8d7;
      --bg: #eef5fb;
      --card: #ffffff;
      --line: #d9e3ef;
      --text: #071426;
      --muted: #68768a;
      --danger: #ef4444;
      --ok: #10a66a;
      --warn: #f59e0b;
      --purple: #7c3aed;
      --radius: 8px;
      --shadow: 0 18px 45px rgba(7, 29, 58, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #edf6fb 0%, #f7f9fc 52%, #edf4fa 100%);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 14% 18%, rgba(66, 184, 215, .26), transparent 32%),
        linear-gradient(135deg, #061a34 0%, #0b2f5b 55%, #f4f8fc 55%, #f4f8fc 100%);
    }

    .login-card {
      width: min(430px, 100%);
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, .5);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand img {
      width: 152px;
      height: auto;
      display: block;
      background: #ffffff;
      border-radius: 6px;
    }

    .brand-fallback {
      display: none;
      font-size: 30px;
      font-weight: 900;
      color: #000000;
      letter-spacing: 1px;
    }

    .login-title {
      margin: 0 0 6px;
      font-size: 25px;
      font-weight: 900;
      color: var(--navy);
    }

    .login-sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      font-size: 13px;
      font-weight: 900;
      color: #10233f;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(66, 184, 215, .16);
    }

    .primary {
      background: var(--blue);
      color: #ffffff;
      border-radius: var(--radius);
      padding: 12px 15px;
      font-weight: 900;
    }

    .ghost {
      background: #e9f0f8;
      color: #10233f;
      border-radius: var(--radius);
      padding: 11px 14px;
      font-weight: 900;
    }

    .soft-danger {
      background: #ffe8e8;
      color: #c91818;
      border-radius: var(--radius);
      padding: 11px 14px;
      font-weight: 900;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: #c91818;
      font-weight: 800;
      font-size: 13px;
    }

    .app {
      display: none;
      min-height: 100vh;
    }

    .topbar {
      background: var(--navy);
      color: #ffffff;
      border-bottom: 4px solid var(--sky);
      box-shadow: 0 10px 30px rgba(7, 29, 58, .18);
    }

    .top-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 15px;
      min-width: 0;
    }

    .top-left img {
      width: 150px;
      height: auto;
      background: #ffffff;
      border-radius: 6px;
      padding: 5px 8px;
    }

    .top-title h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      white-space: nowrap;
    }

    .top-title p {
      margin: 3px 0 0;
      color: #b9d9ee;
      font-size: 13px;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      background: #dce8f4;
      padding: 6px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      background: transparent;
      color: #10233f;
      border-radius: 8px;
      padding: 13px 14px;
      font-weight: 900;
    }

    .tab.active {
      background: #ffffff;
      color: var(--blue);
      box-shadow: 0 8px 18px rgba(7, 29, 58, .09);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 36px rgba(7, 29, 58, .08);
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 15px;
      color: var(--navy);
      font-size: 18px;
      font-weight: 900;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .message {
      margin-top: 12px;
      color: var(--navy);
      font-size: 14px;
      font-weight: 800;
    }

    .status-board {
      display: grid;
      gap: 10px;
    }

    .status-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: #fbfdff;
    }

    .status-row b {
      color: var(--navy);
      font-size: 14px;
    }

    .status-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .status-count {
      min-width: 46px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      font-weight: 900;
      background: #eaf7fb;
      color: var(--navy);
    }

    .searchbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .ticket-list {
      display: grid;
      gap: 10px;
    }

    .ticket-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      background: #ffffff;
    }

    .ticket-id {
      padding: 0;
      background: transparent;
      color: #1f55e6;
      font-weight: 900;
      text-align: left;
    }

    .ticket-main {
      min-width: 0;
    }

    .ticket-main strong {
      display: block;
      color: var(--navy);
      font-size: 15px;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .ticket-main small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .s-received {
      background: #fff1ca;
      color: #b06a00;
    }

    .s-checking {
      background: #e7f0ff;
      color: #245bd6;
    }

    .s-customer {
      background: #eee3ff;
      color: #6d28d9;
    }

    .s-done {
      background: #daf5e8;
      color: #08784f;
    }

    .empty {
      padding: 34px 12px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    dialog {
      border: 0;
      border-radius: 14px;
      padding: 0;
      width: min(700px, calc(100vw - 24px));
      box-shadow: 0 28px 80px rgba(0, 0, 0, .28);
    }

    dialog::backdrop {
      background: rgba(7, 20, 38, .48);
    }

    .modal-head {
      background: var(--navy);
      color: #ffffff;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 4px solid var(--sky);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .modal-body {
      padding: 18px 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 130px 1fr;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 15px;
    }

    .detail-grid b,
    .detail-grid div {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      min-width: 0;
      word-break: break-word;
    }

    .detail-grid b {
      background: #f2f6fb;
      color: #10233f;
    }

    .detail-grid b:last-of-type,
    .detail-grid div:last-child {
      border-bottom: 0;
    }

    @media (max-width: 820px) {
      .top-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .top-left img {
        width: 132px;
      }

      .wrap {
        padding: 14px;
      }

      .grid,
      .row {
        grid-template-columns: 1fr;
      }

      .searchbar,
      .ticket-item {
        grid-template-columns: 1fr;
      }

      .actions button,
      .actions a,
      .searchbar button {
        width: 100%;
      }

      .tabs {
        position: sticky;
        top: 0;
        z-index: 4;
      }
    }
  </style>
</head>

<body>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand">
        <img
          src="assets/maersk-logo.png"
          alt="MAERSK"
          onerror="this.style.display='none';document.getElementById('loginBrandFallback').style.display='block';"
        />
        <div id="loginBrandFallback" class="brand-fallback">MAERSK</div>
      </div>

      <h1 class="login-title">RT Ticket</h1>
      <p class="login-sub">현장 작업자 계정으로 로그인하세요.</p>

      <form id="loginForm">
        <div class="field">
          <label for="loginId">ID</label>
          <input id="loginId" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="loginPw">Password</label>
          <input id="loginPw" type="password" autocomplete="current-password" required />
        </div>

        <button class="primary" type="submit" style="width:100%;">로그인</button>
        <div id="loginError" class="error"></div>
      </form>
    </div>
  </section>

  <section id="app" class="app">
    <header class="topbar">
      <div class="top-inner">
        <div class="top-left">
          <img
            src="assets/maersk-logo.png"
            alt="MAERSK"
            onerror="this.outerHTML='<strong style=&quot;font-size:26px;&quot;>MAERSK</strong>';"
          />
          <div class="top-title">
            <h1>RT Ticket</h1>
            <p>Warehouse issue ticket request</p>
          </div>
        </div>

        <button id="logoutBtn" class="ghost">Logout</button>
      </div>
    </header>

    <main class="wrap">
      <div class="tabs">
        <button class="tab active" data-view="createView">티켓 접수</button>
        <button class="tab" data-view="listView">접수 내역</button>
      </div>

      <section id="createView" class="view active">
        <div class="grid">
          <form id="ticketForm" class="card">
            <h2>티켓 접수</h2>

            <div class="row">
              <div class="field">
                <label for="category">문제 카테고리</label>
                <select id="category" required>
                  <option value="">선택해주세요</option>
                  <option>RCP 오류</option>
                  <option>RFID 오류</option>
                  <option>벌크 훼손</option>
                  <option>타매장</option>
                  <option>기타 문제</option>
                </select>
              </div>

              <div class="field">
                <label for="creatorId">작업자 ID</label>
                <input id="creatorId" placeholder="작업자 ID" required />
              </div>
            </div>

            <div class="field">
              <label for="bulkLabel">벌크라벨</label>
              <input id="bulkLabel" placeholder="벌크 스캔해주세요" required />
            </div>

            <div class="field">
              <label for="sku">SKU</label>
              <textarea id="sku" placeholder="SKU 스캔 및 수기입력 해주세요" required></textarea>
              <p class="hint">여러 SKU는 줄바꿈, 띄어쓰기, 쉼표로 입력해도 자동 분리됩니다.</p>
            </div>

            <div class="field">
              <label for="comment">코멘트</label>
              <textarea id="comment" placeholder="상세 내용을 입력해주세요"></textarea>
            </div>

            <div class="field">
              <label for="files">사진 첨부</label>
              <input id="files" type="file" multiple accept="image/*" />
              <p class="hint">첨부 사진은 티켓번호별 Drive 폴더에 저장됩니다.</p>
            </div>

            <button class="primary" type="submit">접수</button>
            <div id="submitMessage" class="message"></div>
          </form>

          <aside class="card">
            <h2>처리 상태</h2>

            <div class="status-board">
              <div class="status-row">
                <div>
                  <b>접수</b>
                  <span>새로 등록된 티켓</span>
                </div>
                <div id="countReceived" class="status-count">0</div>
              </div>

              <div class="status-row">
                <div>
                  <b>내용 확인 중</b>
                  <span>운영팀 확인 중</span>
                </div>
                <div id="countChecking" class="status-count">0</div>
              </div>

              <div class="status-row">
                <div>
                  <b>고객사 확인 중</b>
                  <span>고객사 확인 필요</span>
                </div>
                <div id="countCustomer" class="status-count">0</div>
              </div>

              <div class="status-row">
                <div>
                  <b>완료</b>
                  <span>처리 완료</span>
                </div>
                <div id="countDone" class="status-count">0</div>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <section id="listView" class="view">
        <div class="card">
          <h2>접수 내역</h2>

          <div class="searchbar">
            <input id="ticketSearch" placeholder="티켓번호 또는 날짜 검색 예: RT-20260627, 2026-06-27" />
            <button id="searchBtn" class="primary">검색</button>
            <button id="allBtn" class="ghost">전체</button>
          </div>

          <div id="ticketList" class="ticket-list"></div>
        </div>
      </section>
    </main>
  </section>

  <dialog id="confirmDialog">
    <div class="modal-head">
      <h2>티켓을 접수할까요?</h2>
      <button class="ghost" type="button" onclick="confirmDialog.close()">닫기</button>
    </div>

    <div class="modal-body">
      <p id="confirmText" style="margin:0 0 14px;color:#536176;font-weight:800;"></p>
      <div class="actions">
        <button id="confirmSubmitBtn" class="primary" type="button">접수</button>
        <button class="ghost" type="button" onclick="confirmDialog.close()">취소</button>
      </div>
    </div>
  </dialog>

  <dialog id="detailDialog">
    <div class="modal-head">
      <h2 id="detailTitle">Ticket Detail</h2>
      <button class="ghost" type="button" onclick="detailDialog.close()">닫기</button>
    </div>

    <div class="modal-body">
      <div id="detailGrid" class="detail-grid"></div>

      <div class="actions">
        <a id="photoLink" class="ghost" href="#" target="_blank" rel="noopener">사진 폴더 열기</a>
        <button id="detailRemindBtn" class="primary" type="button">리마인드</button>
      </div>
    </div>
  </dialog>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec";
    const TOKEN_KEY = "rt_worker_auth_token";

    let allTickets = [];
    let currentTicket = null;
    let pendingSubmit = null;

    const $ = id => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function statusPill(status) {
      const safe = status || "접수";
      const className = {
        "접수": "s-received",
        "내용 확인 중": "s-checking",
        "고객사 확인 중": "s-customer",
        "완료": "s-done"
      }[safe] || "s-received";

      return `<span class="pill ${className}">${escapeHtml(safe)}</span>`;
    }

    async function api(action, payload = {}) {
      const token = localStorage.getItem(TOKEN_KEY) || "";

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action,
          token,
          ...payload
        })
      });

      const text = await res.text();
      let data;

      try {
        data = JSON.parse(text);
      } catch (err) {
        throw new Error("서버 응답을 읽을 수 없습니다. Apps Script 배포 상태를 확인해주세요.");
      }

      if (!data.ok) {
        const message =
          typeof data.message === "string" ? data.message :
          typeof data.error === "string" ? data.error :
          JSON.stringify(data.message || data.error || data);

        throw new Error(message);
      }

      return data;
    }

    function showLogin() {
      $("loginPage").style.display = "grid";
      $("app").style.display = "none";
    }

    function showApp() {
      $("loginPage").style.display = "none";
      $("app").style.display = "block";
      loadTickets();
    }

    $("loginForm").addEventListener("submit", async event => {
      event.preventDefault();

      $("loginError").style.display = "none";

      try {
        const data = await api("login", {
          id: $("loginId").value.trim(),
          password: $("loginPw").value,
          requiredRole: "worker"
        });

        if (data.role !== "worker") {
          throw new Error("현장 작업자 권한이 없습니다.");
        }

        localStorage.setItem(TOKEN_KEY, data.token);
        showApp();
      } catch (err) {
        $("loginError").textContent = err.message || "로그인 실패";
        $("loginError").style.display = "block";
      }
    });

    $("logoutBtn").addEventListener("click", async () => {
      try {
        await api("logout");
      } catch (err) {}

      localStorage.removeItem(TOKEN_KEY);
      showLogin();
    });

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".view").forEach(item => item.classList.remove("active"));

        button.classList.add("active");
        $(button.dataset.view).classList.add("active");

        if (button.dataset.view === "listView") {
          loadTickets();
        }
      });
    });

    async function readFiles() {
      const files = Array.from($("files").files || []);

      return Promise.all(files.map(file => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();

          reader.onload = () => {
            resolve({
              name: file.name,
              type: file.type,
              data: reader.result
            });
          };

          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }));
    }

    $("ticketForm").addEventListener("submit", async event => {
      event.preventDefault();

      pendingSubmit = {
        category: $("category").value,
        bulkLabel: $("bulkLabel").value.trim(),
        sku: $("sku").value.trim(),
        creatorId: $("creatorId").value.trim(),
        comment: $("comment").value.trim()
      };

      $("confirmText").textContent = "입력한 내용으로 티켓을 접수합니다.";
      confirmDialog.showModal();
    });

    $("confirmSubmitBtn").addEventListener("click", async () => {
      if (!pendingSubmit) {
        return;
      }

      $("submitMessage").textContent = "접수 중입니다...";
      $("confirmSubmitBtn").disabled = true;

      try {
        const files = await readFiles();

        const data = await api("createTicket", {
          ...pendingSubmit,
          files
        });

        $("submitMessage").innerHTML = `접수 완료: <strong>${escapeHtml(data.ticketId)}</strong>`;
        $("ticketForm").reset();
        pendingSubmit = null;

        confirmDialog.close();
        await loadTickets();
      } catch (err) {
        $("submitMessage").textContent = err.message || "접수 실패";
      } finally {
        $("confirmSubmitBtn").disabled = false;
      }
    });

    async function loadTickets() {
      try {
        const data = await api("list", {});
        allTickets = Array.isArray(data.tickets) ? data.tickets : [];
        renderTickets(allTickets);
        renderCounts();
      } catch (err) {
        $("ticketList").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderTickets(rows) {
      if (!rows.length) {
        $("ticketList").innerHTML = `<div class="empty">조회된 티켓이 없습니다.</div>`;
        return;
      }

      $("ticketList").innerHTML = rows.map(ticket => {
        const reminded = String(ticket.history || "").includes("[리마인드]");

        return `
          <div class="ticket-item">
            <div class="ticket-main">
              <button class="ticket-id" type="button" data-id="${escapeHtml(ticket.ticketId)}">
                ${escapeHtml(ticket.ticketId)}
              </button>
              <small>${escapeHtml(ticket.category)} / ${escapeHtml(ticket.date)}</small>
            </div>

            ${statusPill(ticket.status)}

            <button class="primary remind-btn" type="button" data-id="${escapeHtml(ticket.ticketId)}">
              ${reminded ? "리마인드 완료" : "리마인드"}
            </button>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".ticket-id").forEach(button => {
        button.addEventListener("click", () => openDetail(button.dataset.id));
      });

      document.querySelectorAll(".remind-btn").forEach(button => {
        button.addEventListener("click", () => remindTicket(button.dataset.id));
      });
    }

    function renderCounts() {
      const counts = {
        "접수": 0,
        "내용 확인 중": 0,
        "고객사 확인 중": 0,
        "완료": 0
      };

      allTickets.forEach(ticket => {
        const status = ticket.status || "접수";

        if (counts[status] != null) {
          counts[status] += 1;
        }
      });

      $("countReceived").textContent = counts["접수"];
      $("countChecking").textContent = counts["내용 확인 중"];
      $("countCustomer").textContent = counts["고객사 확인 중"];
      $("countDone").textContent = counts["완료"];
    }

    $("searchBtn").addEventListener("click", () => {
      const keyword = $("ticketSearch").value.trim().toLowerCase();

      if (!keyword) {
        renderTickets(allTickets);
        return;
      }

      const rows = allTickets.filter(ticket => {
        return [
          ticket.ticketId,
          ticket.date
        ].join(" ").toLowerCase().includes(keyword);
      });

      renderTickets(rows);
    });

    $("allBtn").addEventListener("click", () => {
      $("ticketSearch").value = "";
      renderTickets(allTickets);
    });

    $("ticketSearch").addEventListener("keydown", event => {
      if (event.key === "Enter") {
        $("searchBtn").click();
      }
    });

    function openDetail(ticketId) {
      currentTicket = allTickets.find(ticket => ticket.ticketId === ticketId);

      if (!currentTicket) {
        return;
      }

      $("detailTitle").textContent = currentTicket.ticketId;

      const rows = [
        ["Ticket ID", currentTicket.ticketId],
        ["Date", currentTicket.date],
        ["Category", currentTicket.category],
        ["Bulk Label", currentTicket.bulkLabel],
        ["SKU", currentTicket.sku],
        ["작업자", currentTicket.creatorId],
        ["Status", currentTicket.status],
        ["Comment", currentTicket.comment],
        ["History", currentTicket.history]
      ];

      $("detailGrid").innerHTML = rows.map(([label, value]) => {
        return `
          <b>${escapeHtml(label)}</b>
          <div>${escapeHtml(value || "").replaceAll("\n", "<br>")}</div>
        `;
      }).join("");

      if (currentTicket.image) {
        $("photoLink").style.display = "inline-flex";
        $("photoLink").href = currentTicket.image;
      } else {
        $("photoLink").style.display = "none";
        $("photoLink").href = "#";
      }

      detailDialog.showModal();
    }

    async function remindTicket(ticketId) {
      if (!confirm(`${ticketId} 티켓을 리마인드 처리할까요?`)) {
        return;
      }

      try {
        await api("remindTicket", { ticketId });
        await loadTickets();

        if (currentTicket && currentTicket.ticketId === ticketId) {
          currentTicket = allTickets.find(ticket => ticket.ticketId === ticketId);
          detailDialog.close();
        }
      } catch (err) {
        alert(err.message || "리마인드 실패");
      }
    }

    $("detailRemindBtn").addEventListener("click", () => {
      if (currentTicket) {
        remindTicket(currentTicket.ticketId);
      }
    });

    async function init() {
      const token = localStorage.getItem(TOKEN_KEY);

      if (!token) {
        showLogin();
        return;
      }

      try {
        const data = await api("validateToken");

        if (data.role !== "worker") {
          throw new Error("현장 작업자 권한이 없습니다.");
        }

        showApp();
      } catch (err) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin();
      }
    }

    init();
  </script>
</body>
</html>
