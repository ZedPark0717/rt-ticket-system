<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RT Ticket System</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--ink:#07162d;--muted:#667085;--line:#d9e1ec;--brand:#35bed9;--blue:#245cdf;--blue2:#153e9f;--ok:#108a43;--warn:#b7791f;--violet:#6d28d9;--red:#c2410c;--shadow:0 18px 48px rgba(15,23,42,.09)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#eef3f9 100%);color:var(--ink)}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
    .wrap{width:min(1060px,100%);margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;align-items:center;gap:14px}h1,h2{margin:0;letter-spacing:0}h1{font-size:20px}h2{font-size:18px;margin-bottom:14px}.sub{color:var(--muted);font-size:13px;margin-top:3px}
    .logo{display:flex;align-items:center}.logo img{height:42px;width:auto;display:block}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 16px;padding:5px;background:#e7edf6;border-radius:8px}.tab{border:0;border-radius:6px;padding:12px 10px;font-weight:950;color:#526070;background:transparent;cursor:pointer}.tab.active{background:#fff;color:var(--blue);box-shadow:0 3px 12px rgba(15,23,42,.08)}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:14px;align-items:start}.panel{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}form{display:grid;gap:14px}
    label{display:grid;gap:7px;font-size:13px;font-weight:950;color:#344054}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;font:inherit;color:var(--ink);background:#fff}textarea{min-height:128px;resize:vertical}input:focus,select:focus,textarea:focus{outline:3px solid rgba(36,92,223,.14);border-color:var(--blue)}
    .filebox{border:1px dashed #9aa7bd;border-radius:8px;padding:14px;background:#fbfdff}.hint{color:var(--muted);font-size:12px;line-height:1.5}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{border:0;border-radius:8px;min-height:42px;padding:10px 14px;background:#e8eef8;color:#22304a;font-weight:950;cursor:pointer;white-space:nowrap}button.primary{background:var(--blue);color:#fff}button.primary:hover{background:var(--blue2)}button.danger{background:#fee2e2;color:var(--red)}button:disabled{opacity:.58;cursor:progress}
    .result{display:none;border:1px solid #b7d5ff;background:#eef6ff;padding:14px;border-radius:8px;line-height:1.6;margin-top:14px}.searchbar{display:flex;gap:8px;margin-bottom:12px}.searchbar input{flex:1}.tickets{display:grid;gap:9px}
    .ticket-row{display:grid;grid-template-columns:170px minmax(0,1fr) auto auto auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px;min-width:0}.ticket-row:hover{border-color:#b9c7da;box-shadow:0 8px 22px rgba(15,23,42,.06)}
    .ticket-id{border:0;background:transparent;color:var(--blue);font-weight:950;padding:0;min-height:auto;text-align:left;cursor:pointer}.muted{color:var(--muted);font-size:13px}.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-height:26px;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:950;background:#eef2f7;color:#334155;width:fit-content;white-space:nowrap;flex:0 0 auto}.ticket-row>.badge{min-width:92px}.s1{background:#fff4d6;color:var(--warn)}.s2{background:#e8f1ff;color:var(--blue)}.s3{background:#f0e8ff;color:var(--violet)}.s4{background:#e8f8ef;color:var(--ok)}.remind{background:#ffe4e6;color:#be123c}
    .status-panel{display:grid;gap:10px}.status-panel h2{margin-bottom:4px}.status-card{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:54px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff}.status-card .badge{min-width:116px;max-width:none}.status-card strong{color:var(--ink);font-size:15px;font-weight:950;white-space:nowrap}
    dialog{width:min(720px,calc(100% - 28px));border:0;border-radius:8px;padding:0;box-shadow:0 28px 80px rgba(15,23,42,.3)}dialog::backdrop{background:rgba(15,23,42,.45)}.modal{padding:20px}.detail{display:grid;grid-template-columns:120px minmax(0,1fr);gap:10px 12px;margin:14px 0}.detail b{color:#344054}.pre{white-space:pre-wrap;word-break:break-word}
    @media(max-width:820px){.layout,.grid{grid-template-columns:1fr}.ticket-row{grid-template-columns:1fr;gap:6px}.top{align-items:flex-start;flex-direction:column}.panel{border-left:0;border-right:0;border-radius:0;box-shadow:none}.wrap{padding:12px}.searchbar{flex-direction:column}.logo img{height:36px}}
  </style>
</head>
<body>
<header>
  <div class="wrap top">
    <div>
      <h1>RT Ticket System</h1>
      <div class="sub">현장 티켓 접수 및 조회</div>
    </div>
    <div class="logo"><img src="assets/maersk-logo.png" alt="MAERSK"></div>
  </div>
</header>

<main class="wrap">
  <div class="tabs">
    <button class="tab active" type="button" data-view="createView">티켓 접수</button>
    <button class="tab" type="button" data-view="listView">접수 내역</button>
  </div>

  <div class="layout">
    <section id="createView" class="panel">
      <h2>티켓 접수</h2>
      <form id="ticketForm">
        <div class="grid">
          <label>문제 카테고리
            <select name="category" required>
              <option value="">선택</option>
              <option>RCP 오류</option>
              <option>RFID 오류</option>
              <option>벌크 훼손</option>
              <option>타매장</option>
              <option>기타 문제</option>
            </select>
          </label>
          <label>작업자 ID
            <input name="creatorId" required autocomplete="off" placeholder="작업자 ID 입력">
          </label>
        </div>

        <label>벌크라벨
          <input name="bulkLabel" required autocomplete="off" placeholder="벌크 스캔해주세요">
        </label>

        <label>SKU
          <textarea name="sku" required autocomplete="off" placeholder="SKU 스캔 및 수기입력 해주세요"></textarea>
        </label>

        <label>코멘트
          <textarea name="comment" placeholder="추가 내용을 입력해주세요"></textarea>
        </label>

        <label class="filebox">사진 첨부
          <input id="images" type="file" accept="image/*" multiple>
          <span class="hint">사진은 티켓번호별 Google Drive 폴더에 저장됩니다.</span>
        </label>

        <div class="actions">
          <button class="primary" type="submit">접수</button>
          <button type="reset">초기화</button>
        </div>
      </form>
      <div id="submitResult" class="result"></div>
    </section>

    <section id="listView" class="panel" style="display:none">
      <h2>접수 내역</h2>
      <div class="searchbar">
        <input id="ticketSearch" placeholder="티켓번호 또는 날짜 검색 예: RT-20260627, 2026-06-27">
        <button class="primary" id="searchBtn" type="button">검색</button>
        <button id="reloadBtn" type="button">전체</button>
      </div>
      <div id="listStatus" class="hint"></div>
      <div id="ticketList" class="tickets"></div>
    </section>

    <aside class="panel status-panel">
      <h2>처리 상태</h2>
      <div class="status-card"><span class="badge s1">접수</span><strong id="statusCountOpen">0건</strong></div>
      <div class="status-card"><span class="badge s2">내용 확인 중</span><strong id="statusCountCheck">0건</strong></div>
      <div class="status-card"><span class="badge s3">고객사 확인 중</span><strong id="statusCountClient">0건</strong></div>
      <div class="status-card"><span class="badge s4">완료</span><strong id="statusCountDone">0건</strong></div>
    </aside>
  </div>
</main>

<dialog id="confirmDialog">
  <div class="modal">
    <h2>티켓을 접수할까요?</h2>
    <p id="confirmSummary" class="muted"></p>
    <div class="actions">
      <button class="primary" id="confirmSubmit" type="button">접수</button>
      <button id="cancelSubmit" type="button">취소</button>
    </div>
  </div>
</dialog>

<dialog id="detailDialog">
  <div class="modal">
    <h2>티켓 상세</h2>
    <div id="detailBody"></div>
    <div class="actions">
      <button id="detailRemind" type="button">리마인드</button>
      <button id="detailPhoto" type="button">사진</button>
      <button type="button" onclick="document.querySelector('#detailDialog').close()">닫기</button>
    </div>
  </div>
</dialog>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec';

const state = {
  pendingPayload: null,
  submitting: false,
  tickets: [],
  selected: null,
};

const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));

document.addEventListener('DOMContentLoaded', () => {
  loadTickets(false);
});

$$('.tab').forEach((button) => {
  button.addEventListener('click', () => {
    $$('.tab').forEach((item) => item.classList.toggle('active', item === button));
    $('#createView').style.display = button.dataset.view === 'createView' ? '' : 'none';
    $('#listView').style.display = button.dataset.view === 'listView' ? '' : 'none';
    if (button.dataset.view === 'listView') loadTickets(true);
  });
});

$('#ticketForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
  payload.images = await readImages(Array.from($('#images').files || []));
  state.pendingPayload = payload;
  $('#confirmSummary').textContent = `${payload.category} / ${payload.bulkLabel} 티켓을 접수합니다.`;
  $('#confirmDialog').showModal();
});

$('#cancelSubmit').addEventListener('click', () => $('#confirmDialog').close());
$('#confirmSubmit').addEventListener('click', submitTicket);
$('#searchBtn').addEventListener('click', renderList);
$('#ticketSearch').addEventListener('keydown', (event) => { if (event.key === 'Enter') renderList(); });
$('#reloadBtn').addEventListener('click', async () => {
  $('#ticketSearch').value = '';
  await loadTickets(true);
});

async function submitTicket() {
  if (state.submitting || !state.pendingPayload) return;
  state.submitting = true;
  $('#confirmSubmit').disabled = true;

  try {
    const ticket = await api('createTicket', state.pendingPayload);
    $('#confirmDialog').close();
    $('#ticketForm').reset();
    $('#submitResult').style.display = 'block';
    $('#submitResult').innerHTML = `<b>접수 완료</b><br>티켓번호: <b>${escapeHtml(ticket.ticketId)}</b><br>상태: ${escapeHtml(ticket.status)}`;
    await loadTickets(false);
  } catch (err) {
    alert(err.message);
  } finally {
    state.submitting = false;
    $('#confirmSubmit').disabled = false;
  }
}

async function loadTickets(showListMessage) {
  if (showListMessage) {
    $('#listStatus').textContent = '조회 중입니다.';
    $('#ticketList').innerHTML = '';
  }

  try {
    const data = await api('list', {});
    state.tickets = (data.tickets || []).map(normalizeTicket);
    renderStatusCounts();
    if ($('#listView').style.display !== 'none' || showListMessage) renderList();
  } catch (err) {
    if (showListMessage) $('#listStatus').textContent = err.message;
  }
}

function renderStatusCounts() {
  const counts = state.tickets.reduce((acc, ticket) => {
    const status = normalizeStatus(ticket.status);
    acc[status] = (acc[status] || 0) + 1;
    return acc;
  }, {});

  $('#statusCountOpen').textContent = `${counts['접수'] || 0}건`;
  $('#statusCountCheck').textContent = `${counts['내용 확인 중'] || 0}건`;
  $('#statusCountClient').textContent = `${counts['고객사 확인 중'] || 0}건`;
  $('#statusCountDone').textContent = `${counts['완료'] || 0}건`;
}

function renderList() {
  const keyword = clean($('#ticketSearch').value).toLowerCase();
  const tickets = state.tickets.filter((ticket) => {
    if (!keyword) return true;
    return [ticket.ticketId, ticket.date].join(' ').toLowerCase().includes(keyword);
  });

  $('#listStatus').textContent = `${tickets.length}건이 조회되었습니다.`;

  $('#ticketList').innerHTML = tickets.map((ticket) => `
    <article class="ticket-row">
      <button class="ticket-id" data-ticket="${escapeAttr(ticket.ticketId)}">${escapeHtml(ticket.ticketId)}</button>
      <div class="ellipsis">
        <b>${escapeHtml(ticket.category)}</b>
        <div class="muted">${escapeHtml(ticket.date)}</div>
      </div>
      <span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span>
      <span>${ticket.reminded ? '<span class="badge remind">리마인드</span>' : ''}</span>
      <button type="button" data-remind="${escapeAttr(ticket.ticketId)}">리마인드</button>
    </article>
  `).join('') || '<div class="hint">조회된 티켓이 없습니다.</div>';

  $$('button[data-ticket]').forEach((button) => {
    button.addEventListener('click', () => showDetail(button.dataset.ticket));
  });

  $$('button[data-remind]').forEach((button) => {
    button.addEventListener('click', async () => {
      button.disabled = true;
      try {
        await api('remindTicket', { ticketId: button.dataset.remind, actor: 'user' });
        await loadTickets(true);
      } catch (err) {
        alert(err.message);
        button.disabled = false;
      }
    });
  });
}

function showDetail(ticketId) {
  const ticket = state.tickets.find((item) => item.ticketId === ticketId);
  if (!ticket) return;

  state.selected = ticket;
  $('#detailBody').innerHTML = `
    <div class="detail">
      <b>Ticket ID</b><span>${escapeHtml(ticket.ticketId)}</span>
      <b>Date</b><span>${escapeHtml(ticket.date)}</span>
      <b>Category</b><span>${escapeHtml(ticket.category)}</span>
      <b>Bulk Label</b><span>${escapeHtml(ticket.bulkLabel)}</span>
      <b>SKU</b><span class="pre">${escapeHtml(ticket.sku)}</span>
      <b>작업자 ID</b><span>${escapeHtml(ticket.creatorId)}</span>
      <b>Status</b><span><span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span></span>
      <b>리마인드</b><span>${ticket.reminded ? '<span class="badge remind">리마인드 건</span>' : '-'}</span>
      <b>Comment</b><span>${escapeHtml(ticket.comment || '-')}</span>
    </div>
  `;

  $('#detailPhoto').disabled = !ticket.image;
  $('#detailDialog').showModal();
}

$('#detailPhoto').addEventListener('click', () => {
  if (state.selected && state.selected.image) window.open(state.selected.image, '_blank', 'noopener');
});

$('#detailRemind').addEventListener('click', async () => {
  if (!state.selected) return;
  try {
    await api('remindTicket', { ticketId: state.selected.ticketId, actor: 'user' });
    $('#detailDialog').close();
    await loadTickets(true);
  } catch (err) {
    alert(err.message);
  }
});

async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload }),
  });

  const json = await res.json();
  if (!json.ok) throw new Error(json.error?.message || '요청 처리 중 오류가 발생했습니다.');
  return json.data;
}

async function readImages(files) {
  const images = [];
  for (const file of files.slice(0, 6)) {
    images.push({ name: file.name, type: file.type, dataUrl: await resizeImage(file, 1440, .76) });
  }
  return images;
}

function resizeImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function normalizeTicket(ticket) {
  return {
    ticketId: clean(ticket.ticketId),
    date: clean(ticket.date),
    category: normalizeCategory(ticket.category),
    bulkLabel: clean(ticket.bulkLabel),
    sku: String(ticket.sku ?? ''),
    creatorId: clean(ticket.creatorId),
    image: clean(ticket.image),
    comment: String(ticket.comment ?? ''),
    status: normalizeStatus(ticket.status),
    history: String(ticket.history ?? ''),
    reminded: Boolean(ticket.reminded) || String(ticket.history ?? '').includes('[리마인드]'),
  };
}

function normalizeCategory(value) {
  const text = clean(value);
  return !text || text === 'undefined' || text === 'null' ? '미분류' : text;
}

function normalizeStatus(value) {
  const text = clean(value);
  if (text === '내용 확인 중' || text === '고객사 확인 중' || text === '완료') return text;
  return '접수';
}

function statusClass(status) {
  if (status === '내용 확인 중') return 's2';
  if (status === '고객사 확인 중') return 's3';
  if (status === '완료') return 's4';
  return 's1';
}

function clean(value) {
  return String(value ?? '').trim();
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}
</script>
</body>
</html>
