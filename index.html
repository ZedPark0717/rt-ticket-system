<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RT Ticket System</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#667085;--line:#d9dee8;--brand:#2563eb;--brand2:#1d4ed8;--ok:#108a43;--warn:#b7791f;--red:#c2410c;--shadow:0 10px 28px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .wrap{width:min(980px,100%);margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
    h1{margin:0;font-size:20px}h2{margin:0 0 14px;font-size:18px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0 16px;padding:4px;background:#e9edf5;border-radius:8px}
    .tab{border:0;border-radius:6px;padding:12px 10px;font-weight:900;color:var(--muted);background:transparent;cursor:pointer}.tab.active{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(15,23,42,.08)}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:14px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:18px}
    form{display:grid;gap:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:grid;gap:7px;font-size:13px;font-weight:900;color:#334155}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;color:var(--text);background:#fff;font:inherit}textarea{min-height:128px;resize:vertical}
    input:focus,select:focus,textarea:focus{outline:3px solid rgba(37,99,235,.14);border-color:var(--brand)}
    .filebox{border:1px dashed #9aa7bd;border-radius:8px;padding:14px;background:#fbfcff}.hint{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:8px;padding:11px 14px;min-height:42px;font-weight:900;cursor:pointer;background:#e8eef8;color:#23304a;white-space:nowrap}button.primary{background:var(--brand);color:#fff}button.primary:hover{background:var(--brand2)}button:disabled{opacity:.58;cursor:progress}
    .result{display:none;border:1px solid #b7d5ff;background:#eef6ff;padding:14px;border-radius:8px;line-height:1.6}.tickets{display:grid;gap:10px;margin-top:12px}.ticket{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fff;display:grid;gap:8px}
    .ticket-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.ticket-id{font-size:17px;font-weight:950}.meta{color:var(--muted);font-size:13px;line-height:1.5;white-space:pre-wrap}
    .badge{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:950;background:#eef2f7;color:#334155}.badge.s1{background:#fff4d6;color:var(--warn)}.badge.s2{background:#e8f1ff;color:var(--brand)}.badge.s3{background:#f0e8ff;color:#6d28d9}.badge.s4{background:#e8f8ef;color:var(--ok)}.badge.remind{background:#ffe4e6;color:#be123c}
    dialog{width:min(460px,calc(100% - 32px));border:0;border-radius:8px;padding:0;box-shadow:0 24px 80px rgba(15,23,42,.3)}dialog::backdrop{background:rgba(15,23,42,.45)}.modal{padding:20px}.modal h3{margin:0 0 10px}.modal p{margin:0 0 16px;color:var(--muted);line-height:1.55}.hidden{display:none!important}
    @media(max-width:760px){.wrap{padding:12px}.top{align-items:flex-start;flex-direction:column}.layout,.grid{grid-template-columns:1fr}.panel{border-left:0;border-right:0;border-radius:0;box-shadow:none}.tabs{margin-left:0;margin-right:0}}
  </style>
</head>
<body>
<header>
  <div class="wrap top">
    <h1>RT Ticket System</h1>
    <span class="badge">현장 접수</span>
  </div>
</header>

<main class="wrap">
  <div class="tabs">
    <button class="tab active" type="button" data-view="createView">티켓 접수</button>
    <button class="tab" type="button" data-view="myView">접수 내역</button>
  </div>

  <div class="layout">
    <section id="createView" class="panel">
      <h2>티켓 접수</h2>
      <form id="ticketForm">
        <div class="grid">
          <label>문제 카테고리
            <select name="category" required>
              <option value="">선택</option>
              <option>RCP 오류</option>
              <option>RFID 오류</option>
              <option>벌크 훼손</option>
              <option>타매장</option>
              <option>기타 문제</option>
            </select>
          </label>
          <label>작업자 ID
            <input name="creatorId" required autocomplete="off" placeholder="작업자 ID 입력">
          </label>
        </div>

        <label>벌크라벨
          <input name="bulkLabel" required autocomplete="off" placeholder="벌크 스캔해주세요">
        </label>

        <label>SKU
          <textarea name="sku" required autocomplete="off" placeholder="SKU 스캔 및 수기입력 해주세요"></textarea>
        </label>

        <label>코멘트
          <textarea name="comment" placeholder="추가 내용을 입력해주세요"></textarea>
        </label>

        <label class="filebox">사진 첨부
          <input id="images" type="file" accept="image/*" multiple>
          <span class="hint">사진은 티켓번호별 Google Drive 폴더에 저장됩니다.</span>
        </label>

        <div class="actions">
          <button class="primary" type="submit">접수</button>
          <button type="reset">초기화</button>
        </div>
      </form>

      <div id="submitResult" class="result"></div>
    </section>

    <section id="myView" class="panel hidden">
      <h2>접수 내역</h2>
      <form id="lookupForm">
        <label>작업자 ID
          <input name="creatorId" required autocomplete="off" placeholder="작업자 ID 입력">
        </label>
        <div class="actions">
          <button class="primary" type="submit">조회</button>
        </div>
      </form>
      <div id="lookupStatus" class="hint"></div>
      <div id="myTickets" class="tickets"></div>
    </section>

    <aside class="panel">
      <h2>처리 상태</h2>
      <div class="ticket"><div class="ticket-head"><b>접수</b><span class="badge s1">접수</span></div><div class="meta">티켓이 등록되었습니다.</div></div>
      <div class="ticket"><div class="ticket-head"><b>내용 확인 중</b><span class="badge s2">확인</span></div><div class="meta">담당자가 내용을 확인 중입니다.</div></div>
      <div class="ticket"><div class="ticket-head"><b>고객사 확인 중</b><span class="badge s3">확인</span></div><div class="meta">고객사 확인이 필요한 상태입니다.</div></div>
      <div class="ticket"><div class="ticket-head"><b>완료</b><span class="badge s4">완료</span></div><div class="meta">처리가 완료되었습니다.</div></div>
    </aside>
  </div>
</main>

<dialog id="confirmDialog">
  <div class="modal">
    <h3>티켓을 접수할까요?</h3>
    <p id="confirmSummary"></p>
    <div class="actions">
      <button class="primary" id="confirmSubmit" type="button">접수</button>
      <button id="cancelSubmit" type="button">취소</button>
    </div>
  </div>
</dialog>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz9ldnPjiNnag7H0W-Yn92_W5hKU0szPUPbO4b-HStas92BOJwLJ17yHQ_ZZuIQnIg/exec';
const state = { pendingPayload: null, submitting: false };
const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));

$$('.tab').forEach((button) => {
  button.addEventListener('click', () => {
    $$('.tab').forEach((item) => item.classList.toggle('active', item === button));
    ['createView', 'myView'].forEach((id) => $('#' + id).classList.toggle('hidden', id !== button.dataset.view));
  });
});

$('#ticketForm').addEventListener('submit', async (event) => {
  event.preventDefault();

  const form = event.currentTarget;
  const payload = Object.fromEntries(new FormData(form).entries());
  payload.images = await readImages(Array.from($('#images').files || []));

  state.pendingPayload = payload;
  $('#confirmSummary').textContent = `${payload.category} / ${payload.bulkLabel} 티켓을 접수합니다.`;
  $('#confirmDialog').showModal();
});

$('#cancelSubmit').addEventListener('click', () => $('#confirmDialog').close());
$('#confirmSubmit').addEventListener('click', submitTicket);

$('#lookupForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const creatorId = new FormData(event.currentTarget).get('creatorId').trim();
  localStorage.setItem('rt-ticket-creator-id', creatorId);
  await loadMyTickets(creatorId);
});

async function submitTicket() {
  if (state.submitting || !state.pendingPayload) return;

  state.submitting = true;
  $('#confirmSubmit').disabled = true;

  try {
    const ticket = await api('createTicket', state.pendingPayload);
    localStorage.setItem('rt-ticket-creator-id', state.pendingPayload.creatorId || '');

    $('#confirmDialog').close();
    $('#ticketForm').reset();
    $('#submitResult').style.display = 'block';
    $('#submitResult').innerHTML = `<b>접수 완료</b><br>티켓번호: <b>${escapeHtml(ticket.ticketId)}</b><br>상태: ${escapeHtml(ticket.status)}`;
  } catch (err) {
    alert(err.message);
  } finally {
    state.submitting = false;
    $('#confirmSubmit').disabled = false;
  }
}

async function loadMyTickets(creatorId) {
  $('#lookupStatus').textContent = '조회 중입니다.';
  $('#myTickets').innerHTML = '';

  try {
    const data = await api('list', { creatorId });
    const tickets = data.tickets || [];
    $('#lookupStatus').textContent = `${tickets.length}건이 조회되었습니다.`;
    $('#myTickets').innerHTML = tickets.map(renderTicket).join('') || '<div class="hint">조회된 티켓이 없습니다.</div>';
    bindReminderButtons();
  } catch (err) {
    $('#lookupStatus').textContent = err.message;
  }
}

function renderTicket(ticket) {
  return `
    <article class="ticket">
      <div class="ticket-head">
        <span class="ticket-id">${escapeHtml(ticket.ticketId)}</span>
        <span>
          ${ticket.reminded ? '<span class="badge remind">리마인드</span> ' : ''}
          <span class="badge ${statusClass(ticket.status)}">${escapeHtml(ticket.status)}</span>
        </span>
      </div>
      <div><b>${escapeHtml(ticket.category)}</b> · ${escapeHtml(ticket.bulkLabel)}</div>
      <div class="meta">${escapeHtml(ticket.date)}<br>${escapeHtml(ticket.sku)}</div>
      <div class="actions">
        <button type="button" data-remind="${escapeHtml(ticket.ticketId)}">리마인드</button>
        ${ticket.image ? `<a href="${escapeAttr(ticket.image)}" target="_blank" rel="noopener"><button type="button">사진</button></a>` : ''}
      </div>
    </article>
  `;
}

function bindReminderButtons() {
  $$('button[data-remind]').forEach((button) => {
    button.addEventListener('click', async () => {
      button.disabled = true;
      try {
        const creatorId = $('#lookupForm [name="creatorId"]').value.trim();
        await api('remindTicket', { ticketId: button.dataset.remind, creatorId, actor: creatorId || 'user' });
        await loadMyTickets(creatorId);
      } catch (err) {
        alert(err.message);
        button.disabled = false;
      }
    });
  });
}

async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload }),
  });

  const json = await res.json();
  if (!json.ok) throw new Error(json.error?.message || '요청 처리 중 오류가 발생했습니다.');
  return json.data;
}

async function readImages(files) {
  const images = [];
  for (const file of files.slice(0, 6)) {
    images.push({ name: file.name, type: file.type, dataUrl: await resizeImage(file, 1440, .76) });
  }
  return images;
}

function resizeImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function statusClass(status) {
  if (status === '접수') return 's1';
  if (status === '내용 확인 중') return 's2';
  if (status === '고객사 확인 중') return 's3';
  if (status === '완료') return 's4';
  return 's1';
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

const savedCreatorId = localStorage.getItem('rt-ticket-creator-id') || '';
if (savedCreatorId) {
  $('#lookupForm [name="creatorId"]').value = savedCreatorId;
}
</script>
</body>
</html>
